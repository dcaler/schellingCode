# SchellingChords build pipeline — TWO-LEVEL, test-driven tasks for local Ollama workers.
# All code lives under code/. Queue-ready for trundlr (trundlr_project_id: 2);
# queueing held pending user go/no-go. See DESIGN.md §8 for semantics.
#
# TWO LEVELS (the distinction):
#   * TASK   -> has a UNIT TEST. Scope = one deliverable. "Does this file meet its spec?"
#              Runs when a worker finishes the task. Pass -> task done; fail -> block next task.
#   * MODULE -> has a GATE = an INTEGRATION TEST that composes the module's tasks (and
#              upstream modules). Scope = the module working together. Runs only after ALL
#              the module's tasks pass. Pass -> release next module; fail -> block next module.
#
# Per-task contract:
#   worker, depends_on, deliverables, spec,
#   unit_test: {file, cmd}    # the task's own check
# NOTE: all tests/ files are authored & FROZEN in Phase 0 (P0) by qwen. For M0..M9
# implementation tasks the doer writes ONLY the non-test deliverables (the
# schellingchords/* files); it never creates or edits anything under tests/. The
# unit_test.file is the frozen check it must satisfy.
#
# Per-module contract:
#   worker (gate author), gate: {id, integration_test:{file,cmd}, spec}
#
# Orchestration (global):
orchestration:
  task:    {advance_on: unit_test_pass, on_fail: block_next_task}
  module:  {run_gate_when: all_tasks_pass, advance_on: gate_pass, on_fail: block_next_module}
  notify:  email   # at end of EVERY task AND every gate; address configured in trundlr
  git:     commit_and_push_on_pass         # doer commits code/ + pushes origin (git@github.com:dcaler/schellingCode.git) after each passing task/gate

meta:
  project: SchellingChords
  root: code/
  trundlr_project_id: 2
  notify: email   # address configured in trundlr
  workers:
    strong: qwen3.6:27b-16k     # conceptually tricky tasks + integration gates
    worker: llama3.1:8b         # scaffolding / boilerplate
  python: "3.10"                  # runner's /usr/bin/python3 (pinned to the executor reality)
  # Mesa is 3.x on the runner: NO mesa.time schedulers — use Model.agents / AgentSet.
  # pygame is provided by pygame-ce (drop-in `import pygame`). Deps live in --user site.
  runtime_deps: ["mesa>=3.0", numpy, pretty_midi, mido, pyyaml, pygame, pygame_gui]
  test_deps: [pytest]
  audio_deps: [pyfluidsynth]    # libfluidsynth.so.3 present; render via pretty_midi.fluidsynth()
  soundfont: /usr/share/sounds/sf2/default-GM.sf2   # GM SoundFont available on the runner
  gui: pygame + pygame_gui      # live/streaming playback; GUI tests headless (SDL_*_DRIVER=dummy)

# Execution (grounded in the real trundlr API + ~/trundlr/runner.py):
execution:
  trundlr_api: http://100.87.86.57:8251
  project_id: 2                 # "SchellingChords" (reused)
  resources: {gpu: 2, cpu: 3}   # oddjob GPU runs doer/LLM tasks; CPU runs gate pytest
  ollama_host: http://localhost:11434
  doer: doer/doer.py            # lives OUTSIDE code/; the command each impl task runs
  submit: doer/submit.py        # linearizes this DAG -> trundlr tasks (single-parent depends_on_id)
  command_template: 'python3 doer/doer.py --task {id}'   # runner has python3, not `python`
  gate_command_template: 'python3 -m pytest code/{gate_file} -q'
  block_on_fail: dependency_broken   # trundlr auto-blocks downstream on nonzero exit
  test_strategy: frozen-by-qwen      # Phase 0 authors ALL tests; doer writes IMPLEMENTATION ONLY
  notify: trundlr                    # trundlr sends the end-of-task email natively

modules:

  # ============================ PHASE 0: frozen test infrastructure (qwen, unattended)
  # qwen3.6:27b-16k authors ALL tests + fixtures into code/tests/ BEFORE any
  # implementation. These are the executable spec and pin the interfaces. The doer
  # later writes IMPLEMENTATION ONLY and never edits anything under tests/.
  # Each task's check = the authored tests COLLECT (syntactically valid) and, run now
  # against absent implementation, fail as expected (red — proves they actually assert).
  - id: P0
    name: test-infra
    worker: strong
    tasks:
      - id: P0.T0
        title: Harness, shared fixtures, golden values
        worker: strong
        depends_on: []
        deliverables: [tests/conftest.py, tests/golden/]
        spec: >
          Author pytest scaffolding shared by all modules: fixtures (a Config, a small chord
          population, a constructed window with vacancies, a tmp outputs dir) and hand-computed
          golden values (e.g. PitchClassOverlap distances for diatonic pairs) for reuse.
        unit_test: {file: tests/, cmd: pytest --collect-only -q tests/}
      - id: P0.M0
        title: Freeze M0 tests (scaffold + config)
        worker: strong
        depends_on: [P0.T0]
        deliverables: [tests/test_smoke.py, tests/test_config.py, tests/gate_scaffold.py]
        spec: "Author frozen unit + gate tests for M0 per its specs (Config round-trip, validation, default.yaml load)."
        unit_test: {file: tests/gate_scaffold.py, cmd: pytest --collect-only -q tests/test_config.py tests/gate_scaffold.py}
      - id: P0.M1
        title: Freeze M1 tests (chords)
        worker: strong
        depends_on: [P0.M0]
        deliverables: [tests/test_chord_type.py, tests/test_vocabulary.py, tests/gate_chords.py]
        spec: "Frozen tests for Chord type, diatonic vocabulary, select_types, with golden pitch-class sets/voicings."
        unit_test: {file: tests/gate_chords.py, cmd: pytest --collect-only -q tests/test_vocabulary.py tests/gate_chords.py}
      - id: P0.M2
        title: Freeze M2 tests (distance)
        worker: strong
        depends_on: [P0.M1]
        deliverables: [tests/test_metric_registry.py, tests/test_pitch_class_overlap.py, tests/gate_distance.py]
        spec: "Frozen tests for the metric protocol/registry and PitchClassOverlap, with golden distances and ordering (I–V < I–vii°)."
        unit_test: {file: tests/gate_distance.py, cmd: pytest --collect-only -q tests/test_pitch_class_overlap.py tests/gate_distance.py}
      - id: P0.M3
        title: Freeze M3 tests (agent)
        worker: strong
        depends_on: [P0.M2]
        deliverables: [tests/test_satisfaction.py, tests/test_desired_slot.py, tests/gate_agent.py]
        spec: "Frozen tests for satisfaction/is_satisfied and empty-slot desired_slot selection in constructed windows."
        unit_test: {file: tests/gate_agent.py, cmd: pytest --collect-only -q tests/test_desired_slot.py tests/gate_agent.py}
      - id: P0.M4
        title: Freeze M4 tests (model)
        worker: strong
        depends_on: [P0.M3]
        deliverables: [tests/test_schedule.py, tests/test_model.py, tests/gate_model.py]
        spec: "Frozen tests for schedule policy + advancing-window model: determinism, multiset/vacancy conservation, window length, RuntimeParams."
        unit_test: {file: tests/gate_model.py, cmd: pytest --collect-only -q tests/test_model.py tests/gate_model.py}
      - id: P0.M5
        title: Freeze M5 tests (observables)
        worker: strong
        depends_on: [P0.M4]
        deliverables: [tests/test_window_observables.py, tests/test_datacollector.py, tests/gate_observables.py]
        spec: "Frozen tests for segregation_index/region_count/stability_profile and DataCollector wiring (one row/step, trend up)."
        unit_test: {file: tests/gate_observables.py, cmd: pytest --collect-only -q tests/test_datacollector.py tests/gate_observables.py}
      - id: P0.M6
        title: Freeze M6 tests (sonify)
        worker: strong
        depends_on: [P0.M5]
        deliverables: [tests/test_window_midi.py, tests/test_trajectory_render.py, tests/gate_sonify.py]
        spec: "Frozen tests for chord/window->MIDI and trajectory concat (bar counts, pitches match voicings, rests empty; WAV skipped headless)."
        unit_test: {file: tests/gate_sonify.py, cmd: pytest --collect-only -q tests/test_trajectory_render.py tests/gate_sonify.py}
      - id: P0.M7
        title: Freeze M7 tests (run/CLI)
        worker: strong
        depends_on: [P0.M6]
        deliverables: [tests/test_single_run.py, tests/test_sweep_cli.py, tests/gate_run.py]
        spec: "Frozen tests for single()/sweep() + CLI producing .mid/.csv outputs and per-value sweep rows."
        unit_test: {file: tests/gate_run.py, cmd: pytest --collect-only -q tests/test_sweep_cli.py tests/gate_run.py}
      - id: P0.M8
        title: Freeze M8 tests (system acceptance)
        worker: strong
        depends_on: [P0.M7]
        deliverables: [tests/test_demo_config.py, tests/test_acceptance.py, tests/gate_system.py]
        spec: "Frozen end-to-end acceptance: final-window segregation_index > first-window, deterministic, deliverables exist."
        unit_test: {file: tests/gate_system.py, cmd: pytest --collect-only -q tests/test_acceptance.py tests/gate_system.py}
      - id: P0.M9
        title: Freeze M9 tests (GUI/viz, headless)
        worker: strong
        depends_on: [P0.M8]
        deliverables: [tests/test_player.py, tests/test_viz.py, tests/test_gui.py, tests/gate_gui.py]
        spec: "Frozen headless tests for LivePlayer/LatticeView/gui under SDL_*_DRIVER=dummy (tick order, step trigger, slider write-through, surface render)."
        unit_test: {file: tests/gate_gui.py, cmd: "SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy pytest --collect-only -q tests/test_gui.py tests/gate_gui.py"}
    gate:
      id: GP0
      spec: "All frozen tests collect cleanly and the full suite runs RED against the empty stubs (tests assert real behavior, implementation absent)."
      integration_test: {file: tests/gate_testinfra.py, cmd: pytest --collect-only -q tests/}

  # ----------------------------------------------------------------- M0 scaffold
  - id: M0
    name: scaffold
    worker: worker
    tasks:
      - id: M0.T1
        title: Project scaffold, deps, and import smoke
        worker: worker
        depends_on: []
        deliverables: [pyproject.toml, schellingchords/__init__.py, tests/__init__.py, tests/test_smoke.py]
        spec: >
          Create the package layout from DESIGN.md §4 (empty module stubs with docstrings +
          typed signatures, no logic). Declare runtime_deps/test_deps in pyproject.toml.
        unit_test: {file: tests/test_smoke.py, cmd: pytest tests/test_smoke.py -q}
      - id: M0.T2
        title: Config dataclass with YAML round-trip
        worker: worker
        depends_on: [M0.T1]
        deliverables: [schellingchords/config.py, tests/test_config.py, configs/default.yaml]
        spec: >
          Frozen dataclass `Config`: bars_per_window:int=4, beats_per_bar:int=4, radius:int=2,
          tolerance:float, happiness:float=0.5, vacancy_fraction:float=0.25, n_chord_types:int=3,
          n_steps:int, seed:int, tempo_bpm:int=100, metric:str="pitch_class_overlap",
          vocabulary:str="diatonic_major". load_yaml/save_yaml. Validate 0<=vacancy_fraction<1
          and n_chord_types>=2.
        unit_test: {file: tests/test_config.py, cmd: pytest tests/test_config.py -q}
    gate:
      id: G0
      spec: "Installed package imports and configs/default.yaml loads into a valid Config (T1+T2)."
      integration_test: {file: tests/gate_scaffold.py, cmd: pytest tests/gate_scaffold.py -q}

  # ----------------------------------------------------------------- M1 chords
  - id: M1
    name: chords
    worker: worker
    tasks:
      - id: M1.T1
        title: Immutable Chord type
        worker: worker
        depends_on: [M0.T2]
        deliverables: [schellingchords/chords.py, tests/test_chord_type.py]
        spec: >
          Immutable `Chord` (name, root:int 0-11, quality:str, pitch_classes:frozenset[int],
          midi_voicing:tuple[int,...]). Equality/hash by content. Voicing notes must reduce
          (mod 12) to pitch_classes.
        unit_test: {file: tests/test_chord_type.py, cmd: pytest tests/test_chord_type.py -q}
      - id: M1.T2
        title: Diatonic vocabulary + registry + select_types
        worker: worker
        depends_on: [M1.T1]
        deliverables: [schellingchords/chords.py, tests/test_vocabulary.py]
        spec: >
          diatonic_major() -> 7 diatonic triads of C major (I..vii°) with correct pitch-class
          sets and octave-4 voicings. `VOCABULARIES` registry keyed by name. select_types(
          vocabulary, n, rng) -> n distinct chords ("colors"; validate 2<=n<=len(vocabulary)).
        unit_test: {file: tests/test_vocabulary.py, cmd: pytest tests/test_vocabulary.py -q}
    gate:
      id: G1
      spec: >
        From a Config, select_types(diatonic_major, n_chord_types) yields n_chord_types
        distinct valid Chords with voicings consistent with their pitch classes (T1+T2+M0).
      integration_test: {file: tests/gate_chords.py, cmd: pytest tests/gate_chords.py -q}

  # ----------------------------------------------------------------- M2 distance
  - id: M2
    name: distance
    worker: strong
    tasks:
      - id: M2.T1
        title: DistanceMetric protocol + registry + extension stubs
        worker: strong
        depends_on: [M1.T2]
        deliverables: [schellingchords/distance.py, tests/test_metric_registry.py]
        spec: >
          `DistanceMetric` Protocol distance(a:Chord,b:Chord)->float. `METRICS` registry +
          get_metric(name). Typed stubs raising NotImplementedError for TymoczkoVoiceLeading
          and TIV (prove the interface is extensible).
        unit_test: {file: tests/test_metric_registry.py, cmd: pytest tests/test_metric_registry.py -q}
      - id: M2.T2
        title: PitchClassOverlap metric
        worker: strong
        depends_on: [M2.T1]
        deliverables: [schellingchords/distance.py, tests/test_pitch_class_overlap.py]
        spec: >
          `PitchClassOverlap`: 1 - |A∩B|/|A∪B| (Jaccard on pitch classes). Register as
          "pitch_class_overlap". Must satisfy d(x,x)=0, symmetry, non-negativity.
        unit_test: {file: tests/test_pitch_class_overlap.py, cmd: pytest tests/test_pitch_class_overlap.py -q}
    gate:
      id: G2
      spec: >
        get_metric("pitch_class_overlap") run over diatonic_major (M1) orders chords as
        expected: I–V (share G) closer than I–vii°; triangle-inequality spot check (T1+T2+M1).
      integration_test: {file: tests/gate_distance.py, cmd: pytest tests/gate_distance.py -q}

  # ----------------------------------------------------------------- M3 agent
  - id: M3
    name: agent
    worker: strong
    tasks:
      - id: M3.T1
        title: Satisfaction functions
        worker: strong
        depends_on: [M2.T2]
        deliverables: [schellingchords/agent.py, tests/test_satisfaction.py]
        spec: >
          `ChordAgent(mesa.Agent)` holding a Chord. satisfaction(neighbors, metric, tolerance)
          -> fraction of OCCUPIED neighbors within tolerance (vacuously 1.0 if none).
          is_satisfied(..., happiness) -> bool. Pure where possible.
        unit_test: {file: tests/test_satisfaction.py, cmd: pytest tests/test_satisfaction.py -q}
      - id: M3.T2
        title: Desired empty-slot selection
        worker: strong
        depends_on: [M3.T1]
        deliverables: [schellingchords/agent.py, tests/test_desired_slot.py]
        spec: >
          desired_slot chooses, among EMPTY slots in the next window, a best-improving slot
          (max resulting satisfaction); ties broken by the model RNG. Deterministic under seed.
        unit_test: {file: tests/test_desired_slot.py, cmd: pytest tests/test_desired_slot.py -q}
    gate:
      id: G3
      spec: >
        In a constructed window (chords + vacancies) using a real metric (M2) and vocabulary
        (M1): identical-neighbour agent is satisfied; tritone-surrounded agent is unsatisfied
        and its desired_slot is the higher-satisfaction empty slot (T1+T2+M2).
      integration_test: {file: tests/gate_agent.py, cmd: pytest tests/gate_agent.py -q}

  # ----------------------------------------------------------------- M4 model
  - id: M4
    name: model
    worker: strong
    tasks:
      - id: M4.T1
        title: Schedule — movement order + vacancy/collision policy
        worker: strong
        depends_on: [M3.T2]
        deliverables: [schellingchords/schedule.py, tests/test_schedule.py]
        spec: >
          Pure relocation policy: given current window, agents' desired slots, and RNG, assign
          each relocating agent to an empty slot in the next window; resolve collisions
          deterministically; preserve vacancy count. No Mesa coupling.
        unit_test: {file: tests/test_schedule.py, cmd: pytest tests/test_schedule.py -q}
      - id: M4.T2
        title: SchellingChordModel advancing-window loop
        worker: strong
        depends_on: [M4.T1]
        deliverables: [schellingchords/model.py, tests/test_model.py]
        spec: >
          `SchellingChordModel(mesa.Model)`. Window length = bars_per_window*beats_per_bar;
          round(vacancy_fraction*length) empty slots. Initial population filled from
          select_types(vocabulary, n_chord_types, rng) ~evenly. step(): unsatisfied agents
          relocate forward via schedule (M4.T1); satisfied copy forward; multiset+vacancy
          conserved. Read tolerance/happiness/vacancy_fraction from a MUTABLE `RuntimeParams`
          each step (init from Config, NOT the frozen Config) so live edits apply. run(n_steps)
          records each window. Seeded RNG -> reproducible.
        unit_test: {file: tests/test_model.py, cmd: pytest tests/test_model.py -q}
    gate:
      id: G4
      spec: >
        Seeded N-step run end to end (M1+M2+M3+M4): identical history under same seed; chord
        multiset + vacancy count conserved every window; window length correct; a population
        built from n_chord_types appears. (Segregation trend validated in G5.)
      integration_test: {file: tests/gate_model.py, cmd: pytest tests/gate_model.py -q}

  # ----------------------------------------------------------------- M5 observables
  - id: M5
    name: observables
    worker: strong
    tasks:
      - id: M5.T1
        title: Per-window observables
        worker: strong
        depends_on: [M4.T2]
        deliverables: [schellingchords/observables.py, tests/test_window_observables.py]
        spec: >
          segregation_index(window, metric, tolerance) = mean fraction of within-tolerance
          occupied-neighbour pairs; region_count(window, metric, tolerance) = contiguous
          similar-chord runs (rests break runs).
        unit_test: {file: tests/test_window_observables.py, cmd: pytest tests/test_window_observables.py -q}
      - id: M5.T2
        title: Run-level profile + DataCollector wiring
        worker: strong
        depends_on: [M5.T1]
        deliverables: [schellingchords/observables.py, schellingchords/model.py, tests/test_datacollector.py]
        spec: >
          stability_profile(history) = per-position settledness across the run. Wire
          segregation_index/region_count into the model's mesa DataCollector (one row per step).
        unit_test: {file: tests/test_datacollector.py, cmd: pytest tests/test_datacollector.py -q}
    gate:
      id: G5
      spec: >
        Run the model (M4) with observables wired: DataCollector has one row per step, and the
        mean segregation_index is non-decreasing over a multi-run average (segregation happens).
      integration_test: {file: tests/gate_observables.py, cmd: pytest tests/gate_observables.py -q}

  # ----------------------------------------------------------------- M6 sonify
  - id: M6
    name: sonify
    worker: strong
    tasks:
      - id: M6.T1
        title: Chord/window -> MIDI
        worker: strong
        depends_on: [M4.T2]
        deliverables: [schellingchords/sonify.py, tests/test_window_midi.py]
        spec: >
          chord_to_notes(chord) and window_to_midi(window, cfg): place each chord on its beat
          in 4/4 at cfg.tempo_bpm; empty slots = rests (no notes).
        unit_test: {file: tests/test_window_midi.py, cmd: pytest tests/test_window_midi.py -q}
      - id: M6.T2
        title: Trajectory concat + WAV render
        worker: strong
        depends_on: [M6.T1]
        deliverables: [schellingchords/sonify.py, tests/test_trajectory_render.py]
        spec: >
          trajectory_to_midi(history, cfg) concatenates W0..Wn into one pretty_midi.PrettyMIDI.
          render_wav(midi, soundfont, out) via fluidsynth; if unavailable raise a clear error
          and still emit the .mid. Audio render optional in CI (pytest.skip when absent).
        unit_test: {file: tests/test_trajectory_render.py, cmd: pytest tests/test_trajectory_render.py -q}
    gate:
      id: G6
      spec: >
        From a real model history (M4): trajectory_to_midi total bars == n*bars_per_window,
        note pitches match each chord's voicing, empty slots produce no notes; WAV skipped
        headless when fluidsynth/soundfont absent.
      integration_test: {file: tests/gate_sonify.py, cmd: pytest tests/gate_sonify.py -q}

  # ----------------------------------------------------------------- M7 run/CLI
  - id: M7
    name: run
    worker: worker
    tasks:
      - id: M7.T1
        title: single() run -> outputs
        worker: worker
        depends_on: [M5.T2, M6.T2]
        deliverables: [schellingchords/run.py, tests/test_single_run.py]
        spec: >
          single(config_path) runs the model and writes per-window MIDI, concatenated WAV
          (if available), and an observables CSV into outputs/ using the dated naming convention.
        unit_test: {file: tests/test_single_run.py, cmd: pytest tests/test_single_run.py -q}
      - id: M7.T2
        title: sweep() + argparse CLI
        worker: worker
        depends_on: [M7.T1]
        deliverables: [schellingchords/run.py, tests/test_sweep_cli.py]
        spec: >
          sweep(config_path, param, values) runs a phase-diagram (e.g. over tolerance) and
          writes a summary CSV. argparse CLI: python -m schellingchords.run single|sweep ...
        unit_test: {file: tests/test_sweep_cli.py, cmd: pytest tests/test_sweep_cli.py -q}
    gate:
      id: G7
      spec: >
        CLI `single` on configs/default.yaml produces a .mid and an observables .csv in a tmp
        outputs dir; `sweep` over tolerance returns one summary row per value (M4+M5+M6+M7).
      integration_test: {file: tests/gate_run.py, cmd: pytest tests/gate_run.py -q}

  # ----------------------------------------------------------------- M8 system acceptance
  - id: M8
    name: system
    worker: strong
    tasks:
      - id: M8.T1
        title: Demo config
        worker: worker
        depends_on: [M7.T2]
        deliverables: [configs/demo.yaml]
        spec: "A small but musically meaningful run (sensible n_chord_types, tolerance, n_steps)."
        unit_test: {file: tests/test_demo_config.py, cmd: pytest tests/test_demo_config.py -q}
      - id: M8.T2
        title: End-to-end acceptance test
        worker: strong
        depends_on: [M8.T1]
        deliverables: [tests/test_acceptance.py]
        spec: >
          Drive configs/demo.yaml: config -> model run -> MIDI + observables. Assert final-window
          segregation_index > first-window (segregation occurred and is audible in the ordering);
          deterministic under seed; deliverable files exist.
        unit_test: {file: tests/test_acceptance.py, cmd: pytest tests/test_acceptance.py -q}
    gate:
      id: G8
      spec: "System acceptance — the whole headless pipeline (M0..M7) runs and segregation is demonstrable. Release gate."
      integration_test: {file: tests/gate_system.py, cmd: pytest tests/gate_system.py -q}

  # ----------------------------------------------------------------- M9 GUI / live viz
  - id: M9
    name: gui
    worker: strong
    # Stack: pygame + pygame_gui. Mode: LIVE/streaming. Tests headless via
    # SDL_VIDEODRIVER=dummy / SDL_AUDIODRIVER=dummy.
    tasks:
      - id: M9.T1
        title: Live player — real-time step+sonify clock
        worker: strong
        depends_on: [M8.T2]
        deliverables: [schellingchords/player.py, tests/test_player.py]
        spec: >
          `LivePlayer` drives the model in real musical time: per beat it advances the playhead,
          emits a tick (window, beat_index, chord_or_rest), and sends live audio (pygame.midi
          note-on per beat-chord, note-off after the beat; rests = silence). At window end it
          calls model.step() so segregation is heard as it happens. Exposes mutable RuntimeParams
          (tolerance, happiness, vacancy_fraction, tempo_bpm) + play/pause/step/reset. Tick
          generation decoupled from wall-clock for deterministic tests.
        unit_test: {file: tests/test_player.py, cmd: "SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy pytest tests/test_player.py -q"}
      - id: M9.T2
        title: Runtime visualization — lattice strip + playhead
        worker: strong
        depends_on: [M9.T1]
        deliverables: [schellingchords/viz.py, tests/test_viz.py]
        spec: >
          `LatticeView` renders the current window as a strip of beat-cells colored by chord
          type (stable palette keyed to n_chord_types; empty cells = rests) with a playhead at
          the active beat and advancing windows. Pure draw onto a pygame.Surface (headless-testable).
        unit_test: {file: tests/test_viz.py, cmd: "SDL_VIDEODRIVER=dummy pytest tests/test_viz.py -q"}
      - id: M9.T3
        title: Control panel — pygame_gui app
        worker: strong
        depends_on: [M9.T2]
        deliverables: [schellingchords/gui.py, tests/test_gui.py]
        spec: >
          pygame_gui app: sliders/inputs for tolerance, happiness, vacancy_fraction,
          n_chord_types, bars_per_window, radius, tempo_bpm, seed; run/pause/step/reset +
          load/save config; embeds LatticeView + LivePlayer. Live controls write through to
          RuntimeParams (structural params apply on reset). launch(config_path) +
          python -m schellingchords.gui.
        unit_test: {file: tests/test_gui.py, cmd: "SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy pytest tests/test_gui.py -q"}
    gate:
      id: G9
      spec: >
        Headless: launch app, drive a few live ticks — player advances the model, viz renders
        the window, and moving the tolerance slider changes RuntimeParams mid-run (T1+T2+T3).
      integration_test: {file: tests/gate_gui.py, cmd: "SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy pytest tests/gate_gui.py -q"}
